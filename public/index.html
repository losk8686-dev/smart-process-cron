<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Process Cron - ЭДО</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #f0f2f5; 
      color: #1a1a1a; 
      line-height: 1.6; 
    }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { color: #1a73e8; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .header p { color: #5f6368; font-size: 1rem; }
    
    .card { 
      background: #fff; 
      border-radius: 16px; 
      padding: 2rem; 
      margin-bottom: 1.5rem; 
      box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
      border: 1px solid #e8eaed; 
    }
    h2 { color: #202124; margin-bottom: 1.5rem; font-size: 1.25rem; font-weight: 600; }
    
    .tabs { 
      display: flex; 
      gap: 0.5rem; 
      margin-bottom: 1.5rem; 
      background: #fff; 
      padding: 0.5rem; 
      border-radius: 12px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
    }
    .tab { 
      flex: 1; 
      padding: 0.75rem 1rem; 
      text-align: center; 
      border-radius: 8px; 
      cursor: pointer; 
      transition: all 0.2s; 
      font-weight: 500; 
      color: #5f6368; 
    }
    .tab:hover { background: #f8f9fa; }
    .tab.active { 
      background: #1a73e8; 
      color: #fff; 
      box-shadow: 0 2px 8px rgba(26,115,232,0.3); 
    }
    
    .form-group { margin-bottom: 1.25rem; }
    label { 
      display: block; 
      margin-bottom: 0.5rem; 
      font-weight: 500; 
      color: #5f6368; 
      font-size: 0.875rem; 
    }
    input[type="text"], input[type="time"], select { 
      width: 100%; 
      padding: 0.75rem 1rem; 
      border: 2px solid #dadce0; 
      border-radius: 8px; 
      font-size: 1rem; 
      transition: all 0.2s; 
      background: #fff; 
    }
    input:focus, select:focus { 
      outline: none; 
      border-color: #1a73e8; 
      box-shadow: 0 0 0 3px rgba(26,115,232,0.1); 
    }
    
    button { 
      background: #1a73e8; 
      color: #fff; 
      border: none; 
      padding: 0.875rem 2rem; 
      border-radius: 8px; 
      font-size: 1rem; 
      font-weight: 600; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    button:hover { 
      background: #1557b0; 
      transform: translateY(-1px); 
      box-shadow: 0 4px 12px rgba(26,115,232,0.3); 
    }
    button:disabled { 
      opacity: 0.6; 
      cursor: not-allowed; 
      transform: none; 
    }
    button.secondary { 
      background: #f8f9fa; 
      color: #5f6368; 
      border: 1px solid #dadce0; 
    }
    button.secondary:hover { 
      background: #e8eaed; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
    }
    button.danger { 
      background: #fce8e8; 
      color: #d93025; 
      border: 1px solid #ea4335; 
    }
    button.danger:hover { 
      background: #fad2cf; 
    }
    
    .status { 
      padding: 1rem; 
      border-radius: 8px; 
      font-size: 0.875rem; 
    }
    .status.success { 
      background: #e6f4ea; 
      color: #1e8e3e; 
      border: 1px solid #34a853; 
    }
    .status.error { 
      background: #fce8e8; 
      color: #d93025; 
      border: 1px solid #ea4335; 
    }
    .status.info { 
      background: #e8f0fe; 
      color: #1967d2; 
      border: 1px solid #1a73e8; 
    }
    
    .loading { 
      text-align: center; 
      color: #5f6368; 
      padding: 2rem; 
    }
    
    .empty-state { 
      text-align: center; 
      padding: 3rem 2rem; 
      color: #5f6368; 
    }
    .empty-state h3 { 
      color: #202124; 
      margin-bottom: 0.5rem; 
    }
    .empty-state p { 
      margin-bottom: 1.5rem; 
    }
    
    .task-list { display: flex; flex-direction: column; gap: 1rem; }
    .task-item { 
      background: #f8f9fa; 
      border-radius: 12px; 
      padding: 1.5rem; 
      border: 1px solid #e8eaed; 
    }
    .task-item h3 { 
      color: #202124; 
      margin-bottom: 1rem; 
      font-size: 1.1rem; 
    }
    .task-details { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 1rem; 
      margin-bottom: 1rem; 
    }
    .task-details > div { 
      font-size: 0.875rem; 
      color: #5f6368; 
    }
    .task-details strong { 
      color: #202124; 
    }
    
    .stage-list { 
      display: flex; 
      flex-wrap: wrap; 
      gap: 0.5rem; 
      margin-top: 0.5rem; 
    }
    .stage-item { 
      padding: 0.25rem 0.75rem; 
      border-radius: 16px; 
      font-size: 0.875rem; 
      background: #e8eaed; 
      color: #5f6368; 
      border: 2px solid transparent; 
      cursor: pointer; 
      transition: all 0.2s; 
    }
    .stage-item:hover { 
      background: #dadce0; 
    }
    .stage-item.selected { 
      background: #e8f0fe; 
      color: #1967d2; 
      border-color: #1a73e8; 
    }
    
    .task-actions { 
      display: flex; 
      gap: 0.5rem; 
      margin-top: 1rem; 
    }
    .task-actions button { 
      flex: 1; 
      margin-top: 0; 
      padding: 0.5rem 1rem; 
      font-size: 0.875rem; 
    }
    
    .badge { 
      display: inline-block; 
      padding: 0.25rem 0.75rem; 
      border-radius: 12px; 
      font-size: 0.75rem; 
      font-weight: 600; 
    }
    .badge-success { 
      background: #e6f4ea; 
      color: #1e8e3e; 
    }
    .badge-warning { 
      background: #fef3e8; 
      color: #f9ab00; 
    }
    
    .logs { 
      max-height: 500px; 
      overflow-y: auto; 
    }
    .log-entry { 
      padding: 1rem; 
      border-bottom: 1px solid #e8eaed; 
      display: flex; 
      gap: 1rem; 
    }
    .log-entry:last-child { 
      border-bottom: none; 
    }
    .log-entry .timestamp { 
      color: #5f6368; 
      font-size: 0.875rem; 
      white-space: nowrap; 
      min-width: 150px; 
    }
    .log-entry.success { 
      border-left: 3px solid #34a853; 
    }
    .log-entry.warning { 
      border-left: 3px solid #f9ab00; 
    }
    .log-entry.error { 
      border-left: 3px solid #ea4335; 
    }
    
    .modal { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      right: 0; 
      bottom: 0; 
      background: rgba(0,0,0,0.5); 
      z-index: 1000; 
      align-items: center; 
      justify-content: center; 
      padding: 1rem; 
    }
    .modal.active { 
      display: flex; 
    }
    .modal-content { 
      background: #fff; 
      border-radius: 16px; 
      padding: 2rem; 
      width: 100%; 
      max-width: 600px; 
      max-height: 90vh; 
      overflow-y: auto; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
    }
    .modal-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 1.5rem; 
    }
    .modal-header h2 { 
      margin: 0; 
    }
    .close-btn { 
      background: none; 
      border: none; 
      font-size: 1.5rem; 
      cursor: pointer; 
      color: #5f6368; 
      padding: 0; 
      width: auto; 
    }
    .close-btn:hover { 
      color: #202124; 
      transform: none; 
      box-shadow: none; 
    }
    
    @media (max-width: 600px) {
      .task-details { 
        grid-template-columns: 1fr; 
      }
      .task-actions { 
        flex-direction: column; 
      }
      .modal-content { 
        padding: 1.5rem; 
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
